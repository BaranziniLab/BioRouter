name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'documentation/**'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: documentation/package-lock.json

      - name: Install dependencies
        working-directory: documentation
        run: npm ci

      - name: Build documentation
        working-directory: documentation
        run: npm run build
        env:
          NODE_ENV: production

      - name: Copy build to docs directory
        run: |
          rm -rf docs/*
          cp -r documentation/build/* docs/
          touch docs/.nojekyll
          echo "Documentation built and copied to docs/"

      - name: Commit and push to docs directory
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Deploy documentation to GitHub Pages" && git push)
